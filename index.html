<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReportCraft Ultimate - Informes Corporativos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .drop-shadow-soft { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .indent-1 { margin-left: 0; }
        .indent-2 { margin-left: 1.5rem; border-left: 2px solid #f1f5f9; padding-left: 1rem; }
        .indent-3 { margin-left: 3rem; border-left: 2px solid #e2e8f0; padding-left: 1rem; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.4; background: #e0e7ff; }
        .img-container img { object-fit: contain; width: 100%; height: 100%; }
        .nested-sortable { min-height: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                ReportCraft Ultimate
            </h1>
            <div class="flex gap-3">
                <button id="addMainSectionNav" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium transition-all text-sm">
                    + Sección Principal
                </button>
                <button id="generatePdf" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-all flex items-center gap-2 shadow-lg shadow-indigo-200">
                    Generar PDF
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 md:p-12">
        <!-- Portada -->
        <div class="mb-10 bg-white p-8 rounded-2xl border border-slate-200 drop-shadow-soft space-y-6">
            <div class="flex justify-between items-start border-b border-slate-100 pb-6">
                <div class="flex-1 space-y-4">
                    <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400">Datos de la Portada</h2>
                    <input type="text" id="projectName" placeholder="NOMBRE DEL PROYECTO" class="text-sm font-bold w-full border-none focus:ring-0 text-indigo-400 outline-none uppercase" value="Proyecto: Modernización de Infraestructura">
                    <input type="text" id="reportTitle" placeholder="TÍTULO DEL INFORME" class="text-3xl font-black w-full border-none focus:ring-0 placeholder:text-slate-200 outline-none uppercase" value="Reporte de Auditoría Técnica">
                    <input type="text" id="companyName" placeholder="Nombre de la Empresa" class="text-lg w-full border-none focus:ring-0 text-indigo-500 font-semibold outline-none" value="Global Tech Solutions S.A.">
                </div>
                <div class="w-32 h-32 border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center relative overflow-hidden bg-slate-50 hover:border-indigo-300 transition-colors">
                    <input type="file" id="logoInput" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                    <div id="logoPreview" class="w-full h-full flex flex-col items-center justify-center p-2 text-center">
                        <span class="text-[10px] text-slate-400">LOGO EMPRESA</span>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Autor</label>
                    <input type="text" id="reportAuthor" class="w-full border-b border-slate-100 focus:border-indigo-500 py-1 outline-none text-sm" value="Ing. Elena Rodríguez">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Ubicación</label>
                    <input type="text" id="reportLocation" class="w-full border-b border-slate-100 focus:border-indigo-500 py-1 outline-none text-sm" value="Madrid, España">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Fecha</label>
                    <input type="date" id="reportDate" class="w-full border-b border-slate-100 focus:border-indigo-500 py-1 outline-none text-sm">
                </div>
            </div>
        </div>

        <!-- Contenedor de Secciones -->
        <div id="sectionsContainer" class="space-y-4 nested-sortable" data-level="1"></div>

        <!-- Botón para agregar sección al final -->
        <button id="addMainSectionBottom" class="w-full mt-8 py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold hover:border-indigo-300 hover:text-indigo-500 transition-all uppercase text-sm">
            + Añadir Nueva Sección Principal
        </button>
    </main>

    <!-- Modales -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-2xl font-bold mb-2">¡PDF Generado!</h3>
            <p class="text-slate-500 mb-8">El informe está listo para revisión.</p>
            <button onclick="closeModal('modal')" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors">Cerrar</button>
        </div>
    </div>

    <div id="tableModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl max-w-4xl w-full shadow-2xl flex flex-col max-h-[90vh]">
            <h3 class="text-xl font-bold mb-4">Editor de Tabla Técnica</h3>
            <div class="overflow-auto flex-1 border border-slate-100 rounded-lg mb-4">
                <table id="editTableElement" class="w-full text-sm">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="flex justify-between items-center">
                <div class="flex gap-2">
                    <button onclick="tableEditor.addRow()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-bold">+ Fila</button>
                    <button onclick="tableEditor.addCol()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-bold">+ Columna</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="closeModal('tableModal')" class="px-4 py-2 text-slate-400 hover:text-slate-600 font-bold text-xs uppercase">Cancelar</button>
                    <button onclick="tableEditor.save()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let sections = [];
        let companyLogo = null;
        let currentEditingTable = null;

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('reportDate').value = today;
            addSection();
        };

        function initSorting() {
            const containers = document.querySelectorAll('.nested-sortable');
            containers.forEach(container => {
                new Sortable(container, {
                    group: 'nested',
                    animation: 150,
                    handle: '.drag-handle',
                    ghostClass: 'sortable-ghost',
                    fallbackOnBody: true,
                    swapThreshold: 0.65,
                    onEnd: function (evt) {
                        rebuildSectionsArray();
                    }
                });
            });
        }

        function rebuildSectionsArray() {
            const buildLevel = (container) => {
                const newItems = [];
                Array.from(container.children).forEach(child => {
                    const sId = child.getAttribute('data-id');
                    const originalSection = findById(sections, sId);
                    if (originalSection) {
                        const level = parseInt(container.getAttribute('data-level')) || 1;
                        const subContainer = child.querySelector('.nested-sortable');
                        newItems.push({
                            ...originalSection,
                            level: level,
                            children: subContainer ? buildLevel(subContainer) : []
                        });
                    }
                });
                return newItems;
            };

            const mainContainer = document.getElementById('sectionsContainer');
            sections = buildLevel(mainContainer);
            render();
        }

        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    companyLogo = ev.target.result;
                    document.getElementById('logoPreview').innerHTML = `<img src="${companyLogo}" class="max-w-full max-h-full object-contain">`;
                };
                reader.readAsDataURL(file);
            }
        });

        function addSection(parentId = null, level = 1) {
            const id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
            const newSection = {
                id,
                title: level === 1 ? 'Nueva Sección' : 'Subsección',
                level: level,
                blocks: [],
                children: [],
                forcePageBreak: false
            };

            if (!parentId) {
                sections.push(newSection);
            } else {
                const parent = findById(sections, parentId);
                if (parent && level <= 3) parent.children.push(newSection);
            }
            render();
        }

        function findById(list, id) {
            for (let item of list) {
                if (item.id === id) return item;
                const found = findById(item.children, id);
                if (found) return found;
            }
            return null;
        }

        function togglePageBreak(sId) {
            const s = findById(sections, sId);
            s.forcePageBreak = !s.forcePageBreak;
            render();
        }

        function render() {
            const container = document.getElementById('sectionsContainer');
            container.innerHTML = '';

            const renderSectionsList = (list, targetContainer, prefix = '') => {
                list.forEach((s, i) => {
                    const num = prefix + (i + 1);
                    const div = document.createElement('div');
                    div.setAttribute('data-id', s.id);
                    div.className = `bg-white p-6 rounded-2xl border ${s.forcePageBreak ? 'border-indigo-400 border-2' : 'border-slate-200'} shadow-sm indent-${s.level} space-y-4 relative flex gap-4 section-node`;
                    
                    div.innerHTML = `
                        <div class="drag-handle flex items-center text-slate-300 hover:text-indigo-400 transition-colors px-1 h-fit pt-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                        </div>
                        <div class="flex-1 space-y-4">
                            <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                                <div class="flex items-center gap-3 flex-1">
                                    <span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-bold">${num}</span>
                                    <input type="text" value="${s.title}" oninput="findById(sections, '${s.id}').title = this.value" class="font-bold text-lg outline-none w-full bg-transparent">
                                </div>
                                <div class="flex gap-1 items-center">
                                    <button onclick="togglePageBreak('${s.id}')" class="p-1.5 rounded transition-colors ${s.forcePageBreak ? 'bg-indigo-600 text-white' : 'hover:bg-slate-100 text-slate-400'}" title="Forzar Salto de Página">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 15l5 5 5-5M7 9l5-5 5 5"/></svg>
                                    </button>
                                    <button onclick="addSection('${s.id}', ${s.level+1})" class="p-1.5 hover:bg-slate-100 text-slate-500 rounded" title="Añadir Subsección">+</button>
                                    <button onclick="removeSection('${s.id}')" class="p-1.5 hover:bg-rose-50 text-rose-500 rounded">×</button>
                                </div>
                            </div>
                            <div class="space-y-4 py-2">
                                ${s.blocks.map(b => renderBlock(s.id, b)).join('')}
                            </div>
                            <div class="flex gap-4 pt-2 border-t border-slate-50">
                                <button onclick="addBlock('${s.id}', 'text')" class="text-[10px] font-bold text-slate-400 hover:text-indigo-600 uppercase transition-colors">+ Texto</button>
                                <button onclick="addBlock('${s.id}', 'table')" class="text-[10px] font-bold text-slate-400 hover:text-indigo-600 uppercase transition-colors">+ Tabla</button>
                                <button onclick="addBlock('${s.id}', 'figure')" class="text-[10px] font-bold text-slate-400 hover:text-indigo-600 uppercase transition-colors">+ Figura (1-3 Fotos)</button>
                            </div>
                            <div class="nested-sortable space-y-4 mt-4" data-level="${s.level + 1}"></div>
                        </div>
                    `;
                    targetContainer.appendChild(div);
                    if (s.children.length > 0) {
                        const subContainer = div.querySelector('.nested-sortable');
                        renderSectionsList(s.children, subContainer, num + '.');
                    }
                });
            };
            renderSectionsList(sections, container);
            initSorting();
        }

        const renderBlock = (sId, b) => {
            if (b.type === 'text') {
                return `
                <div class="group relative bg-slate-50/50 p-3 rounded-lg">
                    <textarea oninput="findById(sections, '${sId}').blocks.find(bl => bl.id === '${b.id}').data.content = this.value" 
                        class="w-full bg-transparent border-none focus:ring-0 text-sm text-slate-600 resize-none" placeholder="Escribe contenido..." rows="2">${b.data.content}</textarea>
                    <button onclick="removeBlock('${sId}', '${b.id}')" class="absolute top-1 right-1 opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500">×</button>
                </div>`;
            }
            if (b.type === 'figure') {
                return `
                <div class="group relative bg-slate-50/50 p-3 rounded-lg space-y-3">
                    <div class="grid grid-cols-3 gap-2">
                        ${b.data.images.map((img, idx) => `
                            <div class="aspect-square bg-white border rounded overflow-hidden relative img-container">
                                <img src="${img}" class="object-contain w-full h-full">
                                <button onclick="removeImage('${sId}', '${b.id}', ${idx})" class="absolute top-0 right-0 bg-rose-500 text-white px-1 text-[10px]">×</button>
                            </div>
                        `).join('')}
                        ${b.data.images.length < 3 ? `
                        <div class="aspect-square border-2 border-dashed border-slate-200 rounded flex items-center justify-center relative hover:bg-white cursor-pointer">
                            <span class="text-xl text-slate-300">+</span>
                            <input type="file" onchange="handleBlockImage('${sId}', '${b.id}', this.files[0])" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>` : ''}
                    </div>
                    <input type="text" value="${b.data.caption}" oninput="findById(sections, '${sId}').blocks.find(bl => bl.id === '${b.id}').data.caption = this.value" 
                        class="w-full bg-transparent border-none italic text-xs text-slate-400 focus:ring-0 text-center" placeholder="Pie de figura...">
                    <button onclick="removeBlock('${sId}', '${b.id}')" class="absolute top-1 right-1 opacity-0 group-hover:opacity-100 text-slate-300">×</button>
                </div>`;
            }
            if (b.type === 'table') {
                return `
                <div class="group relative bg-indigo-50/30 p-3 rounded-lg border border-indigo-100/50 flex justify-between items-center">
                    <div class="text-[10px] uppercase font-bold text-indigo-400">Tabla Técnica (${b.data.rows.length} filas)</div>
                    <div class="flex gap-2">
                        <button onclick="tableEditor.open('${sId}', '${b.id}')" class="bg-white text-indigo-600 px-3 py-1 rounded text-[10px] font-bold border border-indigo-100">EDITAR</button>
                        <button onclick="removeBlock('${sId}', '${b.id}')" class="text-slate-300 hover:text-rose-500">×</button>
                    </div>
                </div>`;
            }
            return '';
        }

        function addBlock(sId, type) {
            const s = findById(sections, sId);
            let data = type === 'text' ? { content: '' } : 
                       type === 'figure' ? { images: [], caption: 'Descripción de la figura' } : 
                       { headers: ['Item', 'Descripción', 'Estado'], rows: [['1', 'Ejemplo', 'OK']] };
            s.blocks.push({ id: Date.now().toString(), type, data });
            render();
        }

        function removeBlock(sId, bId) {
            const s = findById(sections, sId);
            s.blocks = s.blocks.filter(b => b.id !== bId);
            render();
        }

        function removeSection(id) {
            const remove = (list) => {
                const idx = list.findIndex(s => s.id === id);
                if (idx > -1) { list.splice(idx, 1); return true; }
                for (let s of list) if (remove(s.children)) return true;
                return false;
            };
            remove(sections);
            render();
        }

        function handleBlockImage(sId, bId, file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const s = findById(sections, sId);
                const b = s.blocks.find(bl => bl.id === bId);
                if (b.data.images.length < 3) b.data.images.push(e.target.result);
                render();
            };
            reader.readAsDataURL(file);
        }

        function removeImage(sId, bId, idx) {
            const s = findById(sections, sId);
            const b = s.blocks.find(bl => bl.id === bId);
            b.data.images.splice(idx, 1);
            render();
        }

        const tableEditor = {
            tempData: null,
            open(sId, bId) {
                currentEditingTable = { sId, bId };
                const s = findById(sections, sId);
                const b = s.blocks.find(bl => bl.id === bId);
                this.tempData = JSON.parse(JSON.stringify(b.data));
                this.renderModal();
                document.getElementById('tableModal').style.display = 'flex';
            },
            renderModal() {
                const head = document.getElementById('tableHead');
                const body = document.getElementById('tableBody');
                head.innerHTML = ''; body.innerHTML = '';
                const hRow = document.createElement('tr');
                this.tempData.headers.forEach((h, i) => {
                    hRow.innerHTML += `<th class="border p-2 bg-slate-50"><input type="text" value="${h}" oninput="tableEditor.tempData.headers[${i}] = this.value" class="font-bold text-center w-full outline-none"><button onclick="tableEditor.removeCol(${i})" class="text-[8px] text-rose-400">Quitar</button></th>`;
                });
                head.appendChild(hRow);
                this.tempData.rows.forEach((row, ri) => {
                    const bRow = document.createElement('tr');
                    row.forEach((cell, ci) => {
                        bRow.innerHTML += `<td class="border p-1"><input type="text" value="${cell}" oninput="tableEditor.tempData.rows[${ri}][${ci}] = this.value" class="w-full text-center outline-none"></td>`;
                    });
                    bRow.innerHTML += `<td class="p-1"><button onclick="tableEditor.removeRow(${ri})" class="text-rose-400">×</button></td>`;
                    body.appendChild(bRow);
                });
            },
            addRow() { this.tempData.rows.push(new Array(this.tempData.headers.length).fill('...')); this.renderModal(); },
            addCol() { this.tempData.headers.push('Nueva'); this.tempData.rows.forEach(r => r.push('...')); this.renderModal(); },
            removeRow(i) { this.tempData.rows.splice(i, 1); this.renderModal(); },
            removeCol(i) { this.tempData.headers.splice(i, 1); this.tempData.rows.forEach(r => r.splice(i, 1)); this.renderModal(); },
            save() {
                const s = findById(sections, currentEditingTable.sId);
                const b = s.blocks.find(bl => bl.id === currentEditingTable.bId);
                b.data = this.tempData;
                closeModal('tableModal');
                render();
            }
        };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('addMainSectionNav').onclick = () => addSection();
        document.getElementById('addMainSectionBottom').onclick = () => addSection();

        document.getElementById('generatePdf').onclick = async () => {
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 25;
            
            let flatItems = [];
            const flatten = (list, prefix = '') => {
                list.forEach((s, i) => {
                    const num = prefix + (i + 1);
                    flatItems.push({ ...s, number: num });
                    flatten(s.children, num + '.');
                });
            };
            flatten(sections);

            // Portada
            if (companyLogo) doc.addImage(companyLogo, 'PNG', margin, 20, 30, 30);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(11);
            doc.setTextColor(148, 163, 184);
            doc.text(document.getElementById('projectName').value.toUpperCase(), margin, 90);
            
            doc.setFontSize(26);
            doc.setTextColor(30, 41, 59);
            // Calculamos líneas para el título para ajustar el Y de lo siguiente
            const titleLines = doc.splitTextToSize(document.getElementById('reportTitle').value.toUpperCase(), pageWidth - 50);
            doc.text(titleLines, margin, 105);
            
            const nextY = 105 + (titleLines.length * 12);
            doc.setFontSize(14);
            doc.setTextColor(79, 70, 229);
            doc.text(document.getElementById('companyName').value, margin, nextY);
            
            doc.setTextColor(100, 116, 139);
            doc.setFontSize(10);
            doc.text(`Autor: ${document.getElementById('reportAuthor').value}`, margin, 230);
            doc.text(`Ubicación: ${document.getElementById('reportLocation').value}`, margin, 238);
            doc.text(`Fecha: ${document.getElementById('reportDate').value}`, margin, 246);

            // Indice
            doc.addPage();
            doc.setFont("helvetica", "bold");
            doc.setFontSize(20);
            doc.setTextColor(30, 41, 59);
            doc.text("ÍNDICE", margin, 30);
            let idxY = 50;
            flatItems.forEach((item, idx) => {
                doc.setFontSize(10);
                doc.setTextColor(79, 70, 229);
                const label = `${item.number} ${item.title}`;
                doc.text(label, margin + (item.level - 1) * 7, idxY);
                idxY += 7;
                if(idxY > 270) { doc.addPage(); idxY = 30; }
            });

            // Contenido
            let currentY = 30;
            let firstContentPage = true;

            for (const item of flatItems) {
                // Saltamos página si: 
                // 1. Es una sección principal (y no es el primer item del contenido)
                // 2. El usuario forzó el salto manualmente
                if ((item.level === 1 && !firstContentPage) || item.forcePageBreak) {
                    doc.addPage();
                    currentY = 30;
                }
                
                if(firstContentPage) {
                    doc.addPage();
                    firstContentPage = false;
                    currentY = 30;
                }

                // Controlar que el título de sección no quede al final de la página solo
                if (currentY > pageHeight - 40) {
                    doc.addPage();
                    currentY = 30;
                }

                doc.setFontSize(item.level === 1 ? 18 : 14);
                doc.setFont("helvetica", "bold");
                doc.setTextColor(item.level === 1 ? "#4f46e5" : "#1e293b");
                doc.text(`${item.number} ${item.title}`, margin, currentY);
                currentY += 12;

                for (const block of item.blocks) {
                    if (currentY > pageHeight - 30) { doc.addPage(); currentY = 30; }

                    if (block.type === 'text') {
                        doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(71, 85, 105);
                        const lines = doc.splitTextToSize(block.data.content || "(Vacío)", pageWidth - (margin * 2));
                        doc.text(lines, margin, currentY);
                        currentY += (lines.length * 5) + 8;
                    }

                    if (block.type === 'table') {
                        doc.autoTable({
                            startY: currentY,
                            head: [block.data.headers],
                            body: block.data.rows,
                            margin: { left: margin },
                            styles: { fontSize: 9 },
                            headStyles: { fillColor: [79, 70, 229] }
                        });
                        currentY = doc.lastAutoTable.finalY + 10;
                    }

                    if (block.type === 'figure' && block.data.images.length > 0) {
                        const count = block.data.images.length;
                        const gap = 5;
                        const totalWidth = pageWidth - (margin * 2);
                        const slotWidth = (totalWidth - (gap * (count - 1))) / count;
                        
                        let maxHeightInRow = 0;
                        const imagesToDraw = [];

                        for (let imgData of block.data.images) {
                            try {
                                const imgProps = doc.getImageProperties(imgData);
                                const ratio = imgProps.height / imgProps.width;
                                const h = slotWidth * ratio;
                                imagesToDraw.push({ data: imgData, h: h, w: slotWidth });
                                if (h > maxHeightInRow) maxHeightInRow = h;
                            } catch(e) { console.error("Error cargando imagen", e); }
                        }

                        if (maxHeightInRow > 70) {
                            const scale = 70 / maxHeightInRow;
                            imagesToDraw.forEach(it => { it.h *= scale; it.w *= scale; });
                            maxHeightInRow = 70;
                        }

                        if (currentY + maxHeightInRow > pageHeight - 30) { doc.addPage(); currentY = 30; }

                        imagesToDraw.forEach((imgObj, i) => {
                            const xPos = margin + (i * (slotWidth + gap));
                            const yOffset = (maxHeightInRow - imgObj.h) / 2;
                            doc.addImage(imgObj.data, 'JPEG', xPos, currentY + yOffset, imgObj.w, imgObj.h);
                        });

                        currentY += maxHeightInRow + 6;
                        doc.setFontSize(8); doc.setFont("helvetica", "italic"); doc.setTextColor(148, 163, 184);
                        doc.text(`Figura ${item.number}: ${block.data.caption}`, pageWidth/2, currentY, { align: 'center' });
                        currentY += 12;
                    }
                }
                currentY += 5; // Pequeño espacio entre secciones
            }

            doc.save(`Reporte_${Date.now()}.pdf`);
            document.getElementById('modal').style.display = 'flex';
        };
    </script>
</body>
</html>

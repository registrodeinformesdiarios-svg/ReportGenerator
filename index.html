<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Creador de informes automatizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .indent-1 { margin-left: 0; }
        .indent-2 { margin-left: 1.5rem; border-left: 2px solid #f1f5f9; padding-left: 1rem; }
        .indent-3 { margin-left: 3rem; border-left: 2px solid #e2e8f0; padding-left: 1rem; }
        
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        
        .nested-sortable { min-height: 20px; }
        .blocks-sortable { min-height: 10px; }

        #pdfPreviewContainer { height: calc(100vh - 140px); position: sticky; top: 110px; }
        
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #f8fafc;
        }

        .resizable-textarea {
            resize: vertical;
            min-height: 80px;
            overflow: auto;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-full px-6 mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                Creador de informes automatizado
            </h1>
            <div class="flex gap-3">
                <input type="file" id="importTxtInput" accept=".txt" class="hidden">
                <button onclick="document.getElementById('importTxtInput').click()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-5 py-2 rounded-xl font-medium transition-all text-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Importar
                </button>
                <button onclick="exportTxt()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-5 py-2 rounded-xl font-medium transition-all text-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Exportar
                </button>
                <button onclick="updatePreview()" class="bg-slate-800 hover:bg-black text-white px-5 py-2 rounded-xl font-medium transition-all text-sm">
                    Actualizar Vista Previa
                </button>
                <button id="generatePdfBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl font-bold transition-all shadow-lg shadow-indigo-100">
                    Descargar PDF
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="space-y-6">
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-6">
                <div class="flex justify-between items-start border-b border-slate-50 pb-6">
                    <div class="flex-1 space-y-4">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Configuración General</label>
                        <input type="text" id="projectName" placeholder="NOMBRE DEL PROYECTO" class="text-sm font-bold w-full border-none focus:ring-0 text-indigo-400 uppercase" value="Auditoría Infraestructura 2024">
                        <input type="text" id="reportTitle" placeholder="TÍTULO DEL INFORME" class="text-3xl font-black w-full border-none focus:ring-0 outline-none uppercase" value="Informe de Estado Técnico">
                    </div>
                    <div class="w-24 h-24 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center relative bg-slate-50">
                        <input type="file" id="logoInput" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                        <div id="logoPreview" class="w-full h-full flex items-center justify-center p-2 text-center text-[8px] text-slate-400 uppercase font-bold">Logo</div>
                    </div>
                </div>
                
                <div id="coverFieldsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase">Autor</label><input type="text" id="reportAuthor" class="w-full border-b border-slate-100 py-1 outline-none text-sm" value="Ing. Marcos Solís"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase">Fecha</label><input type="date" id="reportDate" class="w-full border-b border-slate-100 py-1 outline-none text-sm"></div>
                </div>
                <button onclick="addCoverField()" class="text-[10px] font-bold text-indigo-500 hover:underline uppercase">+ Añadir campo personalizado</button>
            </div>

            <div id="sectionsContainer" class="space-y-4 nested-sortable" data-level="1"></div>
            <button id="addMainSectionBottom" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 font-bold hover:border-indigo-300 hover:text-indigo-500 transition-all uppercase text-sm">+ Nueva Sección Principal</button>
        </div>

        <div class="hidden lg:block">
            <div id="pdfPreviewContainer" class="bg-slate-200 rounded-3xl overflow-hidden border border-slate-300 flex items-center justify-center">
                <div id="previewPlaceholder" class="text-slate-500 flex flex-col items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="opacity-20"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                    <p class="text-sm font-medium">Vista previa no generada</p>
                </div>
                <iframe id="pdfIframe" class="w-full h-full hidden"></iframe>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl max-w-xs w-full text-center shadow-xl">
            <h3 class="text-xl font-bold mb-4 text-indigo-600">¡PDF Listo!</h3>
            <p class="text-sm text-slate-500 mb-6">El documento se ha generado correctamente.</p>
            <button onclick="closeModal('modal')" class="w-full bg-indigo-600 text-white py-3 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-colors">Aceptar</button>
        </div>
    </div>

    <div id="tableModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[100] backdrop-blur-sm p-4">
        <div class="bg-white p-6 rounded-3xl max-w-5xl w-full shadow-2xl flex flex-col max-h-[90vh]">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
                Editor de Tabla
            </h3>
            <div class="overflow-auto flex-1 border border-slate-100 rounded-2xl mb-4 bg-slate-50 p-2">
                <table class="w-full text-sm border-collapse">
                    <thead id="tableHead" class="bg-white"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                <div class="flex gap-2">
                    <button onclick="tableEditor.addRow()" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">+ Fila</button>
                    <button onclick="tableEditor.addColumn()" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">+ Columna</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="closeModal('tableModal')" class="px-4 py-2 text-slate-400 font-bold text-xs uppercase hover:text-slate-600">Cancelar</button>
                    <button onclick="tableEditor.save()" class="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-md">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let sections = [];
        let companyLogo = null;
        let currentEditingTable = null;
        let coverExtraFields = [];

        window.onload = () => {
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
            addSection();
            document.getElementById('addMainSectionBottom').onclick = () => addSection();
            document.getElementById('generatePdfBtn').onclick = () => generateDocument('download');
            
            document.getElementById('logoInput').onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        companyLogo = ev.target.result;
                        document.getElementById('logoPreview').innerHTML = `<img src="${companyLogo}" class="max-w-full max-h-full object-contain">`;
                    };
                    reader.readAsDataURL(file);
                }
            };
        };

        function addCoverField() {
            coverExtraFields.push({ id: Date.now().toString(), label: 'Nuevo Campo', value: '...' });
            renderCoverFields();
        }

        function renderCoverFields() {
            const container = document.getElementById('coverFieldsContainer');
            const base = Array.from(container.children).slice(0,2);
            container.innerHTML = '';
            base.forEach(b => container.appendChild(b));
            coverExtraFields.forEach(f => {
                const d = document.createElement('div');
                d.className = 'bg-slate-50 p-3 rounded-2xl relative group';
                d.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <input type="text" value="${f.label}" oninput="updateCF('${f.id}','label',this.value)" class="text-[9px] font-bold text-slate-400 bg-transparent w-full outline-none uppercase tracking-tighter">
                        <button onclick="removeCF('${f.id}')" class="text-rose-300 opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                    </div>
                    <input type="text" value="${f.value}" oninput="updateCF('${f.id}','value',this.value)" class="text-sm bg-transparent w-full outline-none border-b border-slate-200 focus:border-indigo-400 py-1 transition-all">
                `;
                container.appendChild(d);
            });
        }
        function updateCF(id, k, v) { const f = coverExtraFields.find(x => x.id === id); if(f) f[k] = v; }
        function removeCF(id) { coverExtraFields = coverExtraFields.filter(f => f.id !== id); renderCoverFields(); }

        function initSorting() {
            document.querySelectorAll('.nested-sortable').forEach(c => {
                new Sortable(c, { 
                    group: 'nested', 
                    animation: 150, 
                    handle: '.section-handle', 
                    ghostClass: 'bg-indigo-50', 
                    onEnd: rebuildSectionsArray 
                });
            });

            document.querySelectorAll('.blocks-sortable').forEach(c => {
                new Sortable(c, {
                    group: 'blocks',
                    animation: 150,
                    handle: '.block-handle',
                    ghostClass: 'bg-indigo-50',
                    onEnd: rebuildSectionsArray 
                });
            });
        }

        function rebuildSectionsArray() {
            const build = (cont) => {
                return Array.from(cont.children).map(child => {
                    const sId = child.getAttribute('data-id');
                    const originalS = findById(sections, sId);
                    const blocksCont = child.querySelector('.blocks-sortable');
                    const newBlocks = Array.from(blocksCont.children).map(bChild => {
                        const bId = bChild.getAttribute('data-block-id');
                        return originalS.blocks.find(b => b.id === bId);
                    });
                    const subCont = child.querySelector('.nested-sortable');
                    return { 
                        ...originalS, 
                        blocks: newBlocks,
                        children: subCont ? build(subCont) : [] 
                    };
                });
            };
            sections = build(document.getElementById('sectionsContainer'));
            render();
        }

        function addSection(parentId = null, level = 1) {
            const id = Math.random().toString(36).substr(2, 9);
            const s = { id, title: level === 1 ? 'Nueva Sección' : 'Subsección', level, blocks: [], children: [], forcePageBreak: false };
            if (!parentId) sections.push(s);
            else { const p = findById(sections, parentId); if (p) p.children.push(s); }
            render();
        }

        function findById(list, id) {
            for (let item of list) {
                if (item.id === id) return item;
                const found = findById(item.children, id);
                if (found) return found;
            }
            return null;
        }

        function render() {
            const container = document.getElementById('sectionsContainer');
            container.innerHTML = '';
            let photoCounter = 1;
            let tableCounter = 1;

            const loop = (list, target, prefix = '') => {
                list.forEach((s, i) => {
                    const num = prefix + (i + 1);
                    const d = document.createElement('div');
                    d.setAttribute('data-id', s.id);
                    d.className = `bg-white p-5 rounded-3xl border ${s.forcePageBreak ? 'border-indigo-500 ring-2 ring-indigo-50' : 'border-slate-200'} indent-${s.level} flex gap-4 shadow-sm mb-4`;
                    
                    const blocksHtml = s.blocks.map(b => {
                        const html = renderBlock(s.id, b, photoCounter, tableCounter);
                        if(b.type === 'image') photoCounter++;
                        if(b.type === 'table') tableCounter++;
                        return html;
                    }).join('');

                    d.innerHTML = `
                        <div class="section-handle text-slate-300 cursor-grab mt-2">
                           <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="6" r="1.5"/><circle cx="2" cy="10" r="1.5"/><circle cx="6" cy="2" r="1.5"/><circle cx="6" cy="6" r="1.5"/><circle cx="6" cy="10" r="1.5"/></svg>
                        </div>
                        <div class="flex-1 space-y-4">
                            <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                                <div class="flex items-center gap-3 flex-1">
                                    <span class="text-xs font-black text-indigo-400 bg-indigo-50 px-2 py-1 rounded-lg">${num}</span>
                                    <input type="text" value="${s.title}" oninput="findById(sections, '${s.id}').title = this.value" class="font-bold text-lg outline-none w-full bg-transparent">
                                </div>
                                <div class="flex gap-2">
                                    <button title="Salto de página antes" onclick="findById(sections,'${s.id}').forcePageBreak=!findById(sections,'${s.id}').forcePageBreak;render()" class="w-8 h-8 rounded-full flex items-center justify-center transition-colors ${s.forcePageBreak ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-300 hover:bg-slate-100'}">P</button>
                                    <button title="Añadir subsección" onclick="addSection('${s.id}', ${s.level+1})" class="w-8 h-8 rounded-full text-indigo-500 hover:bg-indigo-50 flex items-center justify-center transition-colors">+</button>
                                    <button title="Eliminar" onclick="removeS('${s.id}')" class="w-8 h-8 rounded-full text-rose-300 hover:bg-rose-50 flex items-center justify-center transition-colors">×</button>
                                </div>
                            </div>
                            <div class="blocks-sortable space-y-3">${blocksHtml}</div>
                            <div class="flex gap-4 pt-3 border-t border-slate-50">
                                <button onclick="addBlock('${s.id}', 'text')" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-indigo-500 transition-colors flex items-center gap-1">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg> Texto
                                </button>
                                <button onclick="addBlock('${s.id}', 'table')" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-indigo-500 transition-colors flex items-center gap-1">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18M9 3v18"/></svg> Tabla
                                </button>
                                <button onclick="addBlock('${s.id}', 'image')" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-indigo-500 transition-colors flex items-center gap-1">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg> Galería
                                </button>
                            </div>
                            <div class="nested-sortable space-y-4 mt-2" data-level="${s.level + 1}"></div>
                        </div>`;
                    target.appendChild(d);
                    if (s.children.length > 0) loop(s.children, d.querySelector('.nested-sortable'), num + '.');
                });
            };
            loop(sections, container);
            initSorting();
        }

        const renderBlock = (sId, b, photoIndex, tableIndex) => {
            const handle = `<div class="block-handle absolute -left-2 top-1/2 -translate-y-1/2 text-slate-200 hover:text-indigo-300 cursor-grab opacity-0 group-hover:opacity-100 transition-opacity">
                <svg width="10" height="16" viewBox="0 0 10 16" fill="currentColor"><circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="6" r="1.5"/><circle cx="2" cy="10" r="1.5"/><circle cx="2" cy="14" r="1.5"/><circle cx="8" cy="2" r="1.5"/><circle cx="8" cy="6" r="1.5"/><circle cx="8" cy="10" r="1.5"/><circle cx="8" cy="14" r="1.5"/></svg>
            </div>`;

            if (b.type === 'text') return `
                <div data-block-id="${b.id}" class="group relative bg-slate-50 p-4 rounded-2xl border border-transparent hover:border-slate-200 transition-all">
                    ${handle}
                    <textarea oninput="findById(sections,'${sId}').blocks.find(x=>x.id==='${b.id}').data.content=this.value" 
                        class="w-full bg-transparent text-sm outline-none resizable-textarea" 
                        placeholder="Escribe aquí el contenido...">${b.data.content}</textarea>
                </div>`;
            
            if (b.type === 'table') return `
                <div data-block-id="${b.id}" class="group relative bg-indigo-50/20 p-4 rounded-2xl border border-indigo-100 space-y-3">
                    ${handle}
                    <div class="flex gap-2 items-center bg-white p-2 rounded-xl border border-slate-100">
                        <span class="text-[10px] font-bold text-indigo-500 whitespace-nowrap">Tabla ${tableIndex}.</span>
                        <input type="text" placeholder="Ingresa titulo..." value="${b.data.caption || ''}" oninput="findById(sections,'${sId}').blocks.find(x=>x.id==='${b.id}').data.caption=this.value" class="w-full bg-transparent text-[10px] font-bold outline-none border-none p-0">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400 uppercase">Contenido de Tabla</span>
                        <button onclick="tableEditor.open('${sId}','${b.id}')" class="text-xs font-bold bg-white text-indigo-600 px-4 py-2 rounded-xl border shadow-sm hover:shadow-md transition-shadow">EDITAR CELDAS</button>
                    </div>
                </div>`;

            if (b.type === 'image') {
                const imagesHtml = b.data.images.map((img, idx) => `
                    <div class="relative w-full aspect-square bg-white rounded-xl overflow-hidden border group/img shadow-sm img-container">
                        ${img.src ? `<img src="${img.src}">` : `<div class="w-full h-full flex flex-col items-center justify-center text-[8px] text-slate-300">VACÍO</div>`}
                        <button onclick="removeBlockImage('${sId}', '${b.id}', ${idx})" class="absolute top-1 right-1 bg-rose-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs opacity-0 group-hover/img:opacity-100 transition-opacity shadow-sm z-10">×</button>
                    </div>
                `).join('');

                return `
                <div data-block-id="${b.id}" class="group relative bg-slate-50 p-4 rounded-2xl border border-dashed border-slate-200 space-y-4">
                    ${handle}
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Figuras (Máx 3)</span>
                        <div class="flex gap-2">
                             <input type="file" id="file_${b.id}" class="hidden" accept="image/*" onchange="handleBlockImage('${sId}', '${b.id}', this)">
                             <label for="file_${b.id}" class="text-[10px] font-bold bg-indigo-600 text-white px-3 py-1 rounded-lg cursor-pointer hover:bg-indigo-700 transition-colors shadow-sm">+ SUBIR</label>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        ${imagesHtml}
                    </div>
                    <div class="flex gap-2 items-center bg-white p-2 rounded-xl border border-slate-100">
                        <span class="text-[10px] font-bold text-indigo-500 whitespace-nowrap">Fotografía ${photoIndex}.</span>
                        <input type="text" placeholder="Ingresa titulo..." value="${b.data.caption || ''}" oninput="findById(sections,'${sId}').blocks.find(x=>x.id==='${b.id}').data.caption=this.value" class="w-full bg-transparent text-[10px] italic outline-none border-none p-0">
                    </div>
                </div>`;
            }
            return '';
        };

        async function normalizeImage(dataUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    resolve({
                        src: canvas.toDataURL('image/jpeg', 0.8),
                        ratio: img.width / img.height,
                        w: img.width,
                        h: img.height
                    });
                };
                img.src = dataUrl;
            });
        }

        async function handleBlockImage(sId, bId, input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const s = findById(sections, sId);
                    const b = s.blocks.find(x => x.id === bId);
                    if (b.data.images.length >= 3) {
                        alert("Máximo 3 imágenes por figura.");
                        return;
                    }
                    const processedImg = await normalizeImage(e.target.result);
                    b.data.images.push(processedImg);
                    render();
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }

        function removeBlockImage(sId, bId, idx) {
            const s = findById(sections, sId);
            const b = s.blocks.find(x => x.id === bId);
            b.data.images.splice(idx, 1);
            render();
        }

        function addBlock(sId, type) {
            const s = findById(sections, sId);
            let data = {};
            if (type === 'text') data = { content: '' };
            if (type === 'table') data = { headers: ['Clave', 'Valor'], rows: [['...', '...']], caption: '' };
            if (type === 'image') data = { images: [], caption: '' };
            s.blocks.push({ id: Math.random().toString(36).substr(2,9), type, data });
            render();
        }

        function removeS(id) {
            const del = (list) => {
                const i = list.findIndex(x => x.id === id);
                if (i > -1) { list.splice(i, 1); return true; }
                for (let x of list) if (del(x.children)) return true;
                return false;
            };
            del(sections); render();
        }

        const tableEditor = {
            open(sId, bId) {
                currentEditingTable = { sId, bId };
                const b = findById(sections, sId).blocks.find(x => x.id === bId);
                this.temp = JSON.parse(JSON.stringify(b.data));
                this.draw();
                document.getElementById('tableModal').style.display = 'flex';
            },
            draw() {
                const h = document.getElementById('tableHead');
                const b = document.getElementById('tableBody');
                h.innerHTML = `<tr>${this.temp.headers.map((x,i) => `
                    <th class="border-b border-slate-200 p-2 relative group">
                        <input value="${x}" oninput="tableEditor.temp.headers[${i}]=this.value" class="w-full text-center outline-none bg-transparent font-bold text-indigo-600">
                        <button onclick="tableEditor.removeColumn(${i})" class="absolute -top-1 -right-1 bg-rose-500 text-white w-4 h-4 rounded-full text-[10px] opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                    </th>`).join('')}</tr>`;
                b.innerHTML = this.temp.rows.map((row, ri) => `
                    <tr class="hover:bg-indigo-50/30 transition-colors">
                        ${row.map((cell, ci) => `<td class="border-b border-slate-100 p-2"><input value="${cell}" oninput="tableEditor.temp.rows[${ri}][${ci}]=this.value" class="w-full text-center outline-none bg-transparent"></td>`).join('')}
                        <td class="w-8 border-b border-slate-100 text-center"><button onclick="tableEditor.removeRow(${ri})" class="text-rose-300 hover:text-rose-500">×</button></td>
                    </tr>`).join('');
            },
            addRow() { this.temp.rows.push(new Array(this.temp.headers.length).fill('...')); this.draw(); },
            addColumn() { 
                this.temp.headers.push('Nuevo'); 
                this.temp.rows.forEach(r => r.push('...'));
                this.draw(); 
            },
            removeRow(ri) { this.temp.rows.splice(ri, 1); this.draw(); },
            removeColumn(ci) {
                if(this.temp.headers.length <= 1) return;
                this.temp.headers.splice(ci, 1);
                this.temp.rows.forEach(r => r.splice(ci, 1));
                this.draw();
            },
            save() {
                findById(sections, currentEditingTable.sId).blocks.find(x => x.id === currentEditingTable.bId).data = this.temp;
                closeModal('tableModal'); render();
            }
        };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function generateDocument(mode = 'download') {
            const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4', compress: true });
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 25;
            const projectHeader = document.getElementById('projectName').value || "REPORTE TÉCNICO";
            const safeBottomLimit = pageHeight - 25;
            
            let photoCounterGlobal = 1;
            let tableCounterGlobal = 1;

            const addHeader = (d, pNum) => {
                d.setFont("helvetica", "normal"); 
                d.setFontSize(8); 
                d.setTextColor(160, 160, 160); // Asegurar color sólido
                d.text(projectHeader.toUpperCase(), margin, 12);
                d.text(`PÁGINA ${pNum}`, pageWidth - margin, 12, { align: 'right' });
                d.setDrawColor(245, 245, 245); 
                d.line(margin, 14, pageWidth - margin, 14);
                // Resetear estado para evitar que afecte al contenido
                d.setTextColor(71, 85, 105);
            };

            // Algoritmo de Justificación Manual para evitar errores visuales
            const drawJustifiedText = (targetDoc, text, x, y, width) => {
                const words = text.split(/\s+/);
                if (words.length <= 1) {
                    targetDoc.text(text, x, y);
                    return;
                }
                const totalWordsWidth = words.reduce((acc, word) => acc + targetDoc.getTextWidth(word), 0);
                const totalSpaceWidth = width - totalWordsWidth;
                const spaceBetween = totalSpaceWidth / (words.length - 1);
                
                let currentX = x;
                words.forEach((word, index) => {
                    targetDoc.text(word, currentX, y);
                    currentX += targetDoc.getTextWidth(word) + spaceBetween;
                });
            };

            const flat = [];
            const flatten = (list, prefix = '') => {
                list.forEach((s, i) => {
                    const num = prefix + (i + 1);
                    flat.push({ ...s, number: num, page: 0 });
                    flatten(s.children, num + '.');
                });
            };
            flatten(sections);

            const renderContent = (targetDoc, isMeasuring = false, pageOffset = 0) => {
                let currentY = 30;
                let first = true;
                if(!isMeasuring) {
                    photoCounterGlobal = 1;
                    tableCounterGlobal = 1;
                }

                flat.forEach((item, idx) => {
                    if (!first && (item.level === 1 || item.forcePageBreak)) {
                        targetDoc.addPage();
                        if (!isMeasuring) addHeader(targetDoc, targetDoc.internal.getNumberOfPages());
                        currentY = 30;
                    }
                    if (first) {
                        targetDoc.addPage(); 
                        if (!isMeasuring) addHeader(targetDoc, targetDoc.internal.getNumberOfPages());
                        first = false;
                    }

                    if (isMeasuring) {
                        item.page = targetDoc.internal.getNumberOfPages() + pageOffset;
                    }

                    if (currentY > safeBottomLimit - 10) {
                        targetDoc.addPage();
                        if (!isMeasuring) addHeader(targetDoc, targetDoc.internal.getNumberOfPages());
                        currentY = 30;
                    }

                    targetDoc.setFontSize(item.level === 1 ? 16 : 13);
                    targetDoc.setFont("helvetica", "bold");
                    targetDoc.setTextColor(79, 70, 229); // #4f46e5
                    targetDoc.text(`${item.number} ${item.title}`, margin, currentY);
                    currentY += 10;

                    item.blocks.forEach(b => {
                        if (b.type === 'text') {
                            targetDoc.setFont("helvetica", "normal"); 
                            targetDoc.setFontSize(10); 
                            targetDoc.setTextColor(71, 85, 105); // #475569 - Consistente
                            
                            const textToRender = b.data.content || "Sin contenido.";
                            const lines = targetDoc.splitTextToSize(textToRender, pageWidth - (margin * 2));
                            
                            lines.forEach((line, lineIdx) => {
                                if (currentY > safeBottomLimit) {
                                    targetDoc.addPage();
                                    if (!isMeasuring) addHeader(targetDoc, targetDoc.internal.getNumberOfPages());
                                    // RE-APLICAR ESTILOS tras cambio de página para evitar "cambio de forma"
                                    targetDoc.setFont("helvetica", "normal"); 
                                    targetDoc.setFontSize(10); 
                                    targetDoc.setTextColor(71, 85, 105);
                                    currentY = 30;
                                }

                                // Si es la última línea del párrafo, no se justifica (alineación izquierda natural)
                                if (lineIdx === lines.length - 1) {
                                    targetDoc.text(line, margin, currentY);
                                } else {
                                    drawJustifiedText(targetDoc, line, margin, currentY, pageWidth - (margin * 2));
                                }
                                currentY += 5.5; 
                            });
                            currentY += 4;
                        }
                        
                        if (b.type === 'table') {
                            if (currentY > safeBottomLimit - 20) {
                                targetDoc.addPage();
                                if (!isMeasuring) addHeader(targetDoc, targetDoc.internal.getNumberOfPages());
                                currentY = 30;
                            }
                            targetDoc.setFontSize(8); 
                            targetDoc.setFont("helvetica", "bold"); 
                            targetDoc.setTextColor(100, 100, 100);
                            const tableTitle = `Tabla ${tableCounterGlobal}. ${b.data.caption || "Ingresa título..."}`;
                            const titleLines = targetDoc.splitTextToSize(tableTitle, pageWidth - (margin * 2));
                            targetDoc.text(titleLines, margin, currentY);
                            currentY += (titleLines.length * 4) + 2;

                            targetDoc.autoTable({
                                startY: currentY, 
                                head: [b.data.headers], 
                                body: b.data.rows,
                                margin: { left: margin, right: margin, bottom: 25 }, 
                                styles: { fontSize: 8, cellPadding: 3, overflow: 'linebreak' },
                                headStyles: { fillColor: [79, 70, 229], fontStyle: 'bold' },
                                didDrawPage: (data) => { if(!isMeasuring) addHeader(targetDoc, targetDoc.internal.getNumberOfPages()); }
                            });
                            currentY = targetDoc.lastAutoTable.finalY + 10;
                            if(!isMeasuring) tableCounterGlobal++;
                        }
                        
                        if (b.type === 'image' && b.data.images.length > 0) {
                            const count = b.data.images.length;
                            const totalWidth = pageWidth - (margin * 2);
                            const gap = 5;
                            const singleWidth = (totalWidth - (gap * (count - 1))) / count;
                            const galleryMaxH = 65; 
                            let effectiveMaxH = 0;

                            const drawImages = b.data.images.map(img => {
                                let w = singleWidth;
                                let h = singleWidth / img.ratio;
                                if (h > galleryMaxH) { h = galleryMaxH; w = h * img.ratio; }
                                if (h > effectiveMaxH) effectiveMaxH = h;
                                return { ...img, drawW: w, drawH: h };
                            });

                            if (currentY + effectiveMaxH > safeBottomLimit - 10) {
                                targetDoc.addPage();
                                if (!isMeasuring) addHeader(targetDoc, targetDoc.internal.getNumberOfPages());
                                currentY = 30;
                            }

                            drawImages.forEach((img, i) => {
                                const containerCenterX = margin + (i * (singleWidth + gap)) + (singleWidth / 2);
                                const x = containerCenterX - (img.drawW / 2);
                                const yOffset = (effectiveMaxH - img.drawH) / 2;
                                try { targetDoc.addImage(img.src, 'JPEG', x, currentY + yOffset, img.drawW, img.drawH); } catch(err) {}
                            });

                            currentY += effectiveMaxH + 4;
                            const fullCaption = `Fotografía ${photoCounterGlobal}. ${b.data.caption || "Ingresa título..."}`;
                            targetDoc.setFontSize(8); targetDoc.setFont("helvetica", "italic"); targetDoc.setTextColor(150, 150, 150);
                            const captionLines = targetDoc.splitTextToSize(fullCaption, totalWidth);
                            targetDoc.text(captionLines, pageWidth / 2, currentY, { align: 'center' });
                            currentY += (captionLines.length * 4) + 6;
                            if(!isMeasuring) photoCounterGlobal++;
                        }
                    });
                });
            };

            const itemsPerIdxPage = 35; 
            const indexPagesCount = Math.ceil(flat.length / itemsPerIdxPage) || 1;
            const measureDoc = new jsPDF();
            renderContent(measureDoc, true, 1 + indexPagesCount - 1); 

            // PORTADA
            if (companyLogo) try { doc.addImage(companyLogo, 'PNG', margin, 20, 25, 25); } catch(e){}
            doc.setFontSize(26); doc.setFont("helvetica", "bold"); doc.setTextColor(30, 41, 59);
            doc.text(document.getElementById('reportTitle').value.toUpperCase(), margin, 100);
            doc.setFontSize(10); doc.setTextColor(79, 70, 229);
            doc.text(projectHeader.toUpperCase(), margin, 90);
            
            let cy = 230;
            const df = (l, v) => { 
                doc.setFont("helvetica", "bold"); doc.setTextColor(148, 163, 184); 
                doc.text(`${l.toUpperCase()}:`, margin, cy); 
                doc.setFont("helvetica", "normal"); doc.setTextColor(30, 41, 59); 
                doc.text(v, margin+35, cy); cy+=7; 
            };
            df("Autor", document.getElementById('reportAuthor').value);
            df("Fecha", document.getElementById('reportDate').value);
            coverExtraFields.forEach(f => df(f.label, f.value));

            // ÍNDICE
            doc.addPage();
            addHeader(doc, 2);
            doc.setFontSize(18); doc.setTextColor(30, 41, 59); doc.text("ÍNDICE", margin, 30);
            let iy = 45;
            flat.forEach((item) => {
                if (iy > 270) { doc.addPage(); addHeader(doc, doc.internal.getNumberOfPages()); iy = 30; }
                const ind = (item.level-1)*6;
                doc.setFontSize(9); doc.setTextColor(79, 70, 229);
                doc.text(`${item.number} ${item.title}`, margin + ind, iy);
                doc.setTextColor(148, 163, 184);
                doc.text(item.page.toString(), pageWidth - margin, iy, { align: 'right' });
                doc.link(margin + ind, iy - 4, pageWidth - (margin * 2), 6, { pageNumber: item.page });
                iy += 7;
            });

            // CONTENIDO FINAL
            renderContent(doc, false);

            if (mode === 'download') { 
                doc.save(`${projectHeader.replace(/\s+/g, '_')}_Informe.pdf`); 
                document.getElementById('modal').style.display='flex'; 
            } else {
                return doc.output('bloburl');
            }
        }

        // ─── EXPORTAR TXT ────────────────────────────────────────────────────────
        function exportTxt() {
            const lines = [];
            lines.push('//-------------------------------------------------');
            lines.push('// Generado por Creador de informes automatizado');
            lines.push('//-------------------------------------------------');
            lines.push('');

            // PORTADA
            lines.push('<portada>');
            if (companyLogo) lines.push(`logo: "${companyLogo}"`);
            lines.push(`titulo: "${document.getElementById('reportTitle').value}"`);
            lines.push(`proyecto: "${document.getElementById('projectName').value}"`);
            lines.push(`autor: "${document.getElementById('reportAuthor').value}"`);
            lines.push(`fecha: "${document.getElementById('reportDate').value}"`);
            coverExtraFields.forEach(f => {
                lines.push(`${f.label}: "${f.value}"`);
            });
            lines.push('</portada>');
            lines.push('');

            // Recopilar tablas y fotografías con IDs para referencia
            const allTables = [];
            const allPhotos = [];
            const gatherMedia = (list) => {
                list.forEach(s => {
                    s.blocks.forEach(b => {
                        if (b.type === 'table') allTables.push({ id: `t${allTables.length + 1}`, block: b });
                        if (b.type === 'image') allPhotos.push({ id: `f${allPhotos.length + 1}`, block: b });
                    });
                    gatherMedia(s.children);
                });
            };
            gatherMedia(sections);

            // Mapas rápidos id de bloque → id de txt
            const tableMap = {};
            allTables.forEach(t => tableMap[t.block.id] = t.id);
            const photoMap = {};
            allPhotos.forEach(p => photoMap[p.block.id] = p.id);

            // SECCIONES
            lines.push('//-------------------------------------------------');
            lines.push('// Secciones');
            lines.push('//-------------------------------------------------');
            const writeSection = (s, depth) => {
                const prefix = '#'.repeat(depth > 0 ? depth : 0);
                lines.push(`${prefix}<seccion nombre="${s.title}"${s.forcePageBreak ? ' salto="true"' : ''}>`);
                s.blocks.forEach(b => {
                    if (b.type === 'text') {
                        lines.push(`<t>${b.data.content}</t>`);
                    } else if (b.type === 'table') {
                        lines.push(`<id="${tableMap[b.id]}">`);
                    } else if (b.type === 'image') {
                        lines.push(`<id="${photoMap[b.id]}">`);
                    }
                });
                s.children.forEach(child => writeSection(child, depth + 1));
            };
            sections.forEach(s => writeSection(s, 0));
            lines.push('');

            // FOTOGRAFÍAS
            if (allPhotos.length > 0) {
                lines.push('//-------------------------------------------------');
                lines.push('// Fotografías');
                lines.push('//-------------------------------------------------');
                allPhotos.forEach(p => {
                    const b = p.block;
                    lines.push(`<fotografia id="${p.id}" nombre="${b.data.caption || ''}">`);
                    const srcs = b.data.images.map(img => `"${img.src}"`).join(',');
                    if (srcs) lines.push(`img: ${srcs}`);
                    lines.push('</fotografia>');
                });
                lines.push('');
            }

            // TABLAS
            if (allTables.length > 0) {
                lines.push('//-------------------------------------------------');
                lines.push('// Tablas');
                lines.push('//-------------------------------------------------');
                allTables.forEach(t => {
                    const b = t.block;
                    lines.push(`<tabla id="${t.id}" nombre="${b.data.caption || ''}">`);
                    lines.push(`  columnas: ${b.data.headers.join(' | ')}`);
                    lines.push('  ---');
                    b.data.rows.forEach(row => lines.push(`  ${row.join(' | ')}`));
                    lines.push('</tabla>');
                });
            }

            const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            const fname = (document.getElementById('projectName').value || 'informe').replace(/\s+/g,'_');
            a.download = `${fname}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // ─── IMPORTAR TXT ────────────────────────────────────────────────────────
        function importTxt(text) {
            // Quitar comentarios
            const clean = text.split('\n').filter(l => !l.trim().startsWith('//')).join('\n');

            // Helper: extraer bloques de una etiqueta
            const getBlock = (tag, src) => {
                const re = new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`, 'gi');
                const matches = [];
                let m;
                while ((m = re.exec(src)) !== null) matches.push({ full: m[0], inner: m[1], attrs: m[0].split('>')[0] });
                return matches;
            };
            const attr = (str, key) => {
                const m = str.match(new RegExp(`${key}="([^"]*)"`));
                return m ? m[1] : '';
            };

            // ── PORTADA ──
            const portadaBlock = getBlock('portada', clean);
            if (portadaBlock.length) {
                const inner = portadaBlock[0].inner;
                const getVal = (key) => { const m = inner.match(new RegExp(`^${key}:\\s*"([^"]*)"`, 'm')); return m ? m[1] : null; };
                const logo = getVal('logo');
                if (logo) {
                    companyLogo = logo;
                    document.getElementById('logoPreview').innerHTML = `<img src="${logo}" class="max-w-full max-h-full object-contain">`;
                }
                if (getVal('titulo')) document.getElementById('reportTitle').value = getVal('titulo');
                if (getVal('proyecto')) document.getElementById('projectName').value = getVal('proyecto');
                if (getVal('autor')) document.getElementById('reportAuthor').value = getVal('autor');
                if (getVal('fecha')) document.getElementById('reportDate').value = getVal('fecha');

                // Campos extra: cualquier clave que no sea las reservadas
                const reserved = ['logo','titulo','proyecto','autor','fecha'];
                coverExtraFields = [];
                inner.split('\n').forEach(l => {
                    const m = l.match(/^(\w[\w\s]*):\s*"([^"]*)"/);
                    if (m && !reserved.includes(m[1].trim())) {
                        coverExtraFields.push({ id: Date.now().toString() + Math.random(), label: m[1].trim(), value: m[2] });
                    }
                });
                renderCoverFields();
            }

            // ── TABLAS (diccionario id→data) ──
            const tableDict = {};
            getBlock('tabla', clean).forEach(t => {
                const id = attr(t.attrs, 'id');
                const nombre = attr(t.attrs, 'nombre');
                const lines = t.inner.split('\n').map(l=>l.trim()).filter(Boolean);
                const colLine = lines.find(l => l.startsWith('columnas:'));
                const headers = colLine ? colLine.replace('columnas:','').trim().split('|').map(h=>h.trim()) : ['Columna'];
                const rows = [];
                let pastSep = false;
                lines.forEach(l => {
                    if (l === '---') { pastSep = true; return; }
                    if (pastSep && l) rows.push(l.split('|').map(c=>c.trim()));
                });
                tableDict[id] = { headers, rows, caption: nombre };
            });

            // ── FOTOGRAFÍAS (diccionario id→data) ──
            const photoDict = {};
            getBlock('fotografia', clean).forEach(p => {
                const id = attr(p.attrs, 'id');
                const nombre = attr(p.attrs, 'nombre');
                const imgLine = p.inner.split('\n').find(l => l.trim().startsWith('img:'));
                const images = [];
                if (imgLine) {
                    const urls = imgLine.replace('img:','').trim().split(',').map(s=>s.trim().replace(/^"|"$/g,''));
                    urls.forEach(url => {
                        if (url) {
                            // Para URLs externas almacenamos como objeto compatible
                            images.push({ src: url, ratio: 4/3, w: 800, h: 600 });
                        }
                    });
                }
                photoDict[id] = { images, caption: nombre };
            });

            // ── SECCIONES ──
            // Parsear líneas de sección del bloque limpio (entre portada y las tablas/fotos)
            sections = [];
            const secLines = clean.split('\n');
            const stack = []; // [{section, depth}]

            // Pre-normalizar imágenes de URLs para tener ratio correcto (async, lo hacemos al final)
            const photoLoadPromises = [];

            secLines.forEach(rawLine => {
                const line = rawLine.trim();
                if (!line) return;

                // Detectar <seccion>
                const secMatch = line.match(/^(#*)(<seccion\s+nombre="([^"]*)"([^>]*)>)/);
                if (secMatch) {
                    const depth = secMatch[1].length; // 0=principal, 1=sub, etc
                    const title = secMatch[3];
                    const salto = secMatch[4] && secMatch[4].includes('salto="true"');
                    const level = depth + 1;
                    const newSec = { id: Math.random().toString(36).substr(2,9), title, level, blocks: [], children: [], forcePageBreak: salto };
                    
                    // Encontrar padre en stack
                    while (stack.length && stack[stack.length-1].depth >= depth) stack.pop();
                    if (stack.length === 0) {
                        sections.push(newSec);
                    } else {
                        stack[stack.length-1].section.children.push(newSec);
                    }
                    stack.push({ section: newSec, depth });
                    return;
                }

                if (!stack.length) return;
                const currentSec = stack[stack.length-1].section;

                // Texto <t>...</t>
                const textMatch = line.match(/^<t>([\s\S]*)<\/t>$/);
                if (textMatch) {
                    currentSec.blocks.push({ id: Math.random().toString(36).substr(2,9), type: 'text', data: { content: textMatch[1] } });
                    return;
                }

                // Referencia <id="...">
                const idRefMatch = line.match(/^<id="([^"]+)">/);
                if (idRefMatch) {
                    const refId = idRefMatch[1];
                    if (tableDict[refId]) {
                        currentSec.blocks.push({ id: Math.random().toString(36).substr(2,9), type: 'table', data: JSON.parse(JSON.stringify(tableDict[refId])) });
                    } else if (photoDict[refId]) {
                        currentSec.blocks.push({ id: Math.random().toString(36).substr(2,9), type: 'image', data: JSON.parse(JSON.stringify(photoDict[refId])) });
                    }
                    return;
                }
            });

            render();
        }

        // Listener para el input de importación
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('importTxtInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    importTxt(ev.target.result);
                    e.target.value = '';
                };
                reader.readAsText(file, 'utf-8');
            });
        });

        async function updatePreview() {
            const pre = document.getElementById('previewPlaceholder');
            const ifr = document.getElementById('pdfIframe');
            pre.innerHTML = `<div class="flex flex-col items-center gap-3"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div><p class="text-xs font-bold text-slate-400">GENERANDO VISTA PREVIA...</p></div>`;
            try { 
                const url = await generateDocument('preview'); 
                ifr.src = url; 
                ifr.classList.remove('hidden'); 
                pre.classList.add('hidden'); 
            } catch(e) { 
                pre.innerHTML = "Error al generar la vista previa."; 
            }
        }
